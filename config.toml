		# Use Markdown to format the string. This works nearly all over the theme
		bio = "**We're the Bydeleys**, <br>Jared, Alison and Emily."
		# The icons will be shown if you enter your username
		twitter = "jaredbydeley"
		github = "jbydeley"
		dribbble = ""
		facebook = "jbydeley"

		copyright = [
			"&copy; Jared Bydeley"
		]


