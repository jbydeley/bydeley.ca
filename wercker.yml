box: debian
build:
  steps:
    - arjen/hugo-build:
      version: "0.15"
      theme: "hugo-theme-air"
      flags: --buildDrafts=true
deploy:
  steps:
    - install-packages:
      packages: rsync
    - add-to-known_hosts:
      hostname: 159.203.11.136
    - mktemp:
      envvar: PRIVATEKEY_PATH
    - create-file:
      name: write key
      filename: $PRIVATEKEY_PATH
      content: $DO_PRIVATE
      overwrite: true
      hide-from-log: true
    - sh4pe/rsync-deploy@1.0.1:
      host: 159.203.11.136
      user: root
      sshkey: $PRIVATEKEY_PATH
      source: ./public
      destination: /usr/share/nginx/html
